services:
  postgres:
    image: postgres:16
    container_name: ninja-habits-postgres
    environment:
      POSTGRES_DB: ninja_habits
      POSTGRES_USER: ninja
      POSTGRES_PASSWORD: ninja
    ports:
      - "15432:5432"
    volumes:
      - ninja-habits-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ninja -d ninja_habits"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  ninja-habits-postgres-data:
